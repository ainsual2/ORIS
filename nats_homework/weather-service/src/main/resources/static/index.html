<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Weather Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: sans-serif;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 2rem 2.5rem;
            min-width: 340px;
            border: 0.5px solid #e0e0e0;
        }
        .city {
            font-size: 22px;
            font-weight: 500;
            margin-bottom: 1.5rem;
            color: #111;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .metric {
            background: #f7f7f5;
            border-radius: 8px;
            padding: 12px 16px;
        }
        .metric-label {
            font-size: 13px;
            color: #888;
            margin-bottom: 4px;
        }
        .metric-value {
            font-size: 24px;
            font-weight: 500;
            color: #111;
        }
        .metric-unit {
            font-size: 14px;
            color: #aaa;
            margin-left: 2px;
        }
        .footer {
            margin-top: 1.5rem;
            font-size: 12px;
            color: #bbb;
            text-align: right;
        }
        .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4caf50;
            margin-right: 6px;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .error { color: #e24b4a; font-size: 14px; margin-top: 1rem; }
    </style>
</head>
<body>
<div class="card">
    <div class="city" id="city">—</div>
    <div class="grid">
        <div class="metric">
            <div class="metric-label">Температура</div>
            <div class="metric-value" id="temp">—<span class="metric-unit">°C</span></div>
        </div>
        <div class="metric">
            <div class="metric-label">Давление</div>
            <div class="metric-value" id="pressure">—<span class="metric-unit">мм рт.ст.</span></div>
        </div>
        <div class="metric">
            <div class="metric-label">Скорость ветра</div>
            <div class="metric-value" id="windSpeed">—<span class="metric-unit">м/с</span></div>
        </div>
        <div class="metric">
            <div class="metric-label">Направление</div>
            <div class="metric-value" id="windDir">—</div>
        </div>
    </div>
    <div class="error" id="error"></div>
    <div class="footer">
        <span class="dot"></span>обновляется каждую секунду &nbsp;|&nbsp; <span id="time">—</span>
    </div>
</div>

<script>
    function update(data) {
        document.getElementById('city').textContent = data.city ?? '—';
        document.getElementById('temp').innerHTML = (data.temp?.toFixed(1) ?? '—') + '<span class="metric-unit"> °C</span>';
        document.getElementById('pressure').innerHTML = (data.pressure?.toFixed(1) ?? '—') + '<span class="metric-unit"> мм рт.ст.</span>';
        document.getElementById('windSpeed').innerHTML = (data.windSpeed?.toFixed(1) ?? '—') + '<span class="metric-unit"> м/с</span>';
        document.getElementById('windDir').textContent = data.windDirection ?? '—';
        document.getElementById('time').textContent = new Date().toLocaleTimeString();
        document.getElementById('error').textContent = '';
    }

    function fetchWeather() {
        fetch('/api/weather')
            .then(r => {
                if (r.status === 204) throw new Error('Нет данных от брокера');
                if (!r.ok) throw new Error('Ошибка сервера: ' + r.status);
                return r.json();
            })
            .then(update)
            .catch(e => {
                document.getElementById('error').textContent = e.message;
            });
    }

    fetchWeather();
    setInterval(fetchWeather, 1000);
</script>
</body>
</html>
